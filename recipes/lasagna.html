    <h1>Resep Asparagus Lasagna</h1>
    <img src="../images/lasagna.jpg" alt="Asparagus Lasagna" width="310" height="310">
    <h2>Bahan-bahan:</h2>
    <ul>
        <li>250g lasagna sheets</li>
        <li>1 cup asparagus, chopped</li>
        <li>1 cup ricotta cheese</li>
        <li>1 cup mozzarella cheese</li>
        <li>2 cloves garlic, minced</li>
        <li>1 tbsp olive oil</li>
        <li>Salt and pepper to taste</li>
    </ul>
